<body class="doc-page">
  <header class="nav">
    <div class="nav-inner">
      <a class="brand" href="./index.html">
        <img
          class="brand-avatar"
          src="https://i0.hdslb.com/bfs/face/b41566f47ea0d0f1e35ed54521c849c68c026892.jpg"
          alt="阿西西头像"

        >
        <span class="brand-text">个人空间·阿西西</span>
      </a>
      <div class="nav-right">
        <nav class="nav-links" aria-label="主导航">
          <a href="./index.html">首页</a>

          <a href="./help.html">帮助</a>

        </nav>

  </header>

  <main class="doc-main">
    <section class="doc-shell glass-card">
      <div class="doc-toolbar">
        <a class="doc-back-link" href="./help.html">返回帮助页</a>
        <p class="doc-kicker">Documentation</p>
      </div>

      <div id="doc-content" class="doc-content" aria-live="polite">
        <article class="doc-empty-state">

          <p>正在读取帮助文档，请稍候。</p>
        </article>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <p>文档内容来自仓库中的 Markdown 文件</p>
  </footer>

  <script>
    const helpDocs = {
      remotelight: {
        title: "遥光·阿西西 使用说明书",
        path: "./res/doc/remotelight_user_help.md"
      }
    };

    const docContent = document.getElementById("doc-content");
    const appKey = new URLSearchParams(window.location.search).get("app");

    function escapeHtml(text) {
      return text
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/\"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function renderInline(text) {
      return escapeHtml(text)
        .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noreferrer">$1</a>')
        .replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>")
        .replace(/`([^`]+)`/g, "<code>$1</code>");
    }

    function markdownToHtml(markdown) {
      const lines = markdown.replace(/\r\n/g, "\n").split("\n");
      const html = [];
      let paragraphBuffer = [];
      let listType = null;
      let listItems = [];
      let inCodeBlock = false;
      let codeLanguage = "";
      let codeLines = [];

      function flushParagraph() {
        if (!paragraphBuffer.length) {
          return;
        }
        html.push(`<p>${renderInline(paragraphBuffer.join(" "))}</p>`);
        paragraphBuffer = [];
      }

      function flushList() {
        if (!listType || !listItems.length) {
          listType = null;
          listItems = [];
          return;
        }
        html.push(`<${listType}>${listItems.join("")}</${listType}>`);
        listType = null;
        listItems = [];
      }

      function flushCodeBlock() {
        if (!inCodeBlock) {
          return;
        }
        const languageClass = codeLanguage ? ` class="language-${escapeHtml(codeLanguage)}"` : "";
        html.push(`<pre><code${languageClass}>${escapeHtml(codeLines.join("\n"))}</code></pre>`);
        inCodeBlock = false;
        codeLanguage = "";
        codeLines = [];
      }

      for (const line of lines) {
        const trimmed = line.trim();

        if (inCodeBlock) {
          if (trimmed.startsWith("```")) {
            flushCodeBlock();
          } else {
            codeLines.push(line);
          }
          continue;
        }

        if (trimmed.startsWith("```")) {
          flushParagraph();
          flushList();
          inCodeBlock = true;
          codeLanguage = trimmed.slice(3).trim();
          codeLines = [];
          continue;
        }

        if (!trimmed) {
          flushParagraph();
          flushList();
          continue;
        }

        if (/^---+$/.test(trimmed)) {
          flushParagraph();
          flushList();
          html.push("<hr>");
          continue;
        }

        const headingMatch = trimmed.match(/^(#{1,3})\s+(.*)$/);
        if (headingMatch) {
          flushParagraph();
          flushList();
          const level = headingMatch[1].length;
          html.push(`<h${level}>${renderInline(headingMatch[2])}</h${level}>`);
          continue;
        }

        const unorderedMatch = trimmed.match(/^-\s+(.*)$/);
        if (unorderedMatch) {
          flushParagraph();
          if (listType && listType !== "ul") {
            flushList();
          }
          listType = "ul";
          listItems.push(`<li>${renderInline(unorderedMatch[1])}</li>`);
          continue;
        }

        const orderedMatch = trimmed.match(/^\d+\.\s+(.*)$/);
        if (orderedMatch) {
          flushParagraph();
          if (listType && listType !== "ol") {
            flushList();
          }
          listType = "ol";
          listItems.push(`<li>${renderInline(orderedMatch[1])}</li>`);
          continue;
        }

        paragraphBuffer.push(trimmed);
      }

      flushParagraph();
      flushList();
      flushCodeBlock();
      return html.join("");
    }

    function renderError(title, message) {
      docContent.innerHTML = `
        <article class="doc-empty-state">
          <h1>${title}</h1>
          <p>${message}</p>
        </article>
      `;
    }

    async function loadDoc() {
      const doc = helpDocs[appKey];

      if (!doc) {
        renderError("文档不存在", "当前说明尚未开放，或链接参数无效。");
        return;
      }

      if (window.location.protocol === "file:") {
        renderError("无法读取文档", "当前是直接打开的本地文件，请通过静态服务器或 GitHub Pages 访问。");
        return;
      }

      try {
        const response = await fetch(doc.path, { cache: "no-store" });
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        const markdown = await response.text();
        document.title = `${doc.title} · 阿西西`;
        docContent.innerHTML = `<article class="doc-article">${markdownToHtml(markdown)}</article>`;
      } catch (error) {
        console.error("Failed to load help doc:", error);
        renderError("文档加载失败", "请确认 Markdown 文件路径正确，或稍后重新访问。");
      }
    }

    loadDoc();
  </script>
</body>
</html>
