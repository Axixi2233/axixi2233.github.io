<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#efe3ff">
  <title>鸣谢</title>
  <link rel="icon" type="image/svg+xml" href="res/icon/favicon.svg?v=20260412-2">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;800&family=Space+Grotesk:wght@500;700&display=swap"
    rel="stylesheet"
  >
  <link rel="stylesheet" href="./style.css?v=20260424-1">
</head>
<body class="credits-page">
  <header class="nav">
    <div class="nav-inner">
      <a class="brand" href="./index.html">
        <img
          class="brand-avatar"
          src="https://i0.hdslb.com/bfs/face/b41566f47ea0d0f1e35ed54521c849c68c026892.jpg"
          alt="阿西西头像"
          referrerpolicy="no-referrer"
          onerror="this.onerror=null;this.src='./res/icon/ic_axi.png';"
        >
        <span class="brand-text">个人空间·阿西西</span>
      </a>
      <div class="nav-right">
        <nav class="nav-links" aria-label="主导航">
          <a href="./index.html">首页</a>
          <a href="./credits.html">鸣谢</a>
          <a href="./help.html">帮助</a>
          <a href="./about.html">关于</a>
        </nav>
      </div>
    </div>
  </header>

  <main class="credits-main">
    <section class="credits-hero-shell">
      <article class="credits-header-card">
        <p class="eyebrow">Credits</p>
        <h1>鸣谢</h1>
        <p class="credits-copy">
          感谢一路以来给予建议、测试支持、反馈与鼓励的朋友们。
        </p>
      </article>

      <aside class="credits-summary-card">
        <div class="credits-qr-card">
          <img class="credits-qr-image" src="./res/pic/qr_wx.png" alt="微信赞赏码">
          <p class="credits-qr-caption">如果这份作品对你有帮助，也欢迎请我喝杯咖啡。</p>
        </div>
      </aside>
    </section>

    <section class="credits-wall-section">
      <div class="section-heading compact">
        <p class="eyebrow">Supporters</p>
        <h2>感谢名单</h2>
        <p class="section-copy credits-copy">
          这份名单献给每一位支持阿西西的朋友。因为有你们，项目才得以持续前进。排名不分先后。
        </p>
      </div>
      <div class="credits-grid" id="credits-grid" aria-live="polite"></div>
    </section>
  </main>

  <footer class="site-footer credits-footer">
    <p>感谢每一份支持与鼓励</p>
  </footer>

  <script>
    const creditsGrid = document.getElementById("credits-grid");
    const fallbackAvatar = "./res/icon/ic_user.png";
    const sponsoredConfigUrl = "./res/config/sponsored.json";

    function createMessageCard(message) {
      const card = document.createElement("article");
      const title = document.createElement("h3");

      card.className = "credit-person-card";
      title.textContent = message;
      card.append(title);

      return card;
    }

    function createCreditCard(entry) {
      const { name = "", avatar = fallbackAvatar } = entry;
      const card = document.createElement("article");
      const image = document.createElement("img");
      const title = document.createElement("h3");

      card.className = "credit-person-card";

      image.className = "credit-person-avatar";
      image.src = avatar || fallbackAvatar;
      image.alt = `${name || "匿名支持者"}头像`;
      image.loading = "lazy";
      image.referrerPolicy = "no-referrer";
      image.onerror = function handleImageError() {
        this.onerror = null;
        this.src = fallbackAvatar;
      };

      title.textContent = name || "匿名支持者";

      card.append(image, title);
      return card;
    }

    function renderCredits(entries) {
      creditsGrid.replaceChildren();

      if (!Array.isArray(entries) || entries.length === 0) {
        creditsGrid.append(createMessageCard("暂时还没有可展示的鸣谢名单。"));
        return;
      }

      const fragment = document.createDocumentFragment();

      entries.forEach((entry) => {
        if (!entry || typeof entry !== "object") {
          return;
        }

        fragment.append(createCreditCard(entry));
      });

      if (!fragment.childNodes.length) {
        creditsGrid.append(createMessageCard("鸣谢数据格式不正确，暂时无法展示。"));
        return;
      }

      creditsGrid.append(fragment);
    }

    async function loadCredits() {
      creditsGrid.replaceChildren(createMessageCard("鸣谢名单加载中..."));

      if (window.location.protocol === "file:") {
        creditsGrid.replaceChildren(
          createMessageCard("当前是直接打开的本地文件，浏览器会拦截读取 sponsored.json。请通过静态服务器访问。")
        );
        return;
      }

      try {
        const response = await fetch(sponsoredConfigUrl, { cache: "no-store" });

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        const entries = await response.json();
        renderCredits(entries);
      } catch (error) {
        console.error("Failed to load sponsored config:", error);
        creditsGrid.replaceChildren(
          createMessageCard("鸣谢名单加载失败，请确认通过静态服务器访问并检查 sponsored.json。")
        );
      }
    }

    loadCredits();
  </script>
</body>
</html>
